<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TypeForge — Precision Typing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root[data-theme="dark"]{
    --ink:#0D1912;
    --surface:#13211A;
    --surface-2:#1B2C22;
    --paper:#ECE9DE;
    --paper-dim:#88998C;
    --orange:#F2793A;
    --orange-dim:#C75F27;
    --violet:#A07BFF;
    --violet-dim:#7C58DD;
    --ribbon:#E1544A;
    --line:#25392C;
    --shadow: 0 20px 60px rgba(0,0,0,0.45);
  }
  :root[data-theme="light"]{
    --ink:#F1EEE0;
    --surface:#FFFFFF;
    --surface-2:#EAE5D2;
    --paper:#132018;
    --paper-dim:#5D6E61;
    --orange:#CC5F1B;
    --orange-dim:#A54B12;
    --violet:#6C43D6;
    --violet-dim:#5433AD;
    --ribbon:#B2382F;
    --line:#DAD3BB;
    --shadow: 0 20px 60px rgba(0,0,0,0.10);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ink);
    color:var(--paper);
    font-family:'Space Grotesk', sans-serif;
    min-height:100vh;
    transition:background .4s ease, color .4s ease;
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:'JetBrains Mono', monospace;}
  .wrap{
    max-width:920px;
    margin:0 auto;
    padding:48px 24px 80px;
  }

  /* Header */
  header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    margin-bottom:36px;
    border-bottom:1px solid var(--line);
    padding-bottom:20px;
  }
  .brand-eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:0.28em;
    color:var(--violet);
    text-transform:uppercase;
    margin-bottom:6px;
  }
  .brand-name{
    font-size:30px;
    font-weight:700;
    letter-spacing:-0.02em;
  }
  .brand-name span{color:var(--orange);}
  .header-controls{display:flex; gap:10px;}
  .icon-btn{
    width:38px;height:38px;
    border-radius:8px;
    border:1px solid var(--line);
    background:var(--surface);
    color:var(--paper-dim);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    font-size:16px;
    transition:all .15s ease;
  }
  .icon-btn:hover{border-color:var(--violet); color:var(--violet);}
  .icon-btn.active{color:var(--violet); border-color:var(--violet);}

  .theme-picker{position:relative;}
  .theme-panel{
    display:none;
    position:absolute;
    top:46px; right:0;
    width:308px;
    max-height:360px;
    overflow-y:auto;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:12px;
    box-shadow:var(--shadow);
    padding:12px;
    z-index:60;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
  }
  .theme-panel.show{display:grid;}
  .theme-swatch{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    padding:8px 6px;
    border-radius:8px;
    border:1px solid transparent;
    background:transparent;
    cursor:pointer;
    transition:all .12s ease;
  }
  .theme-swatch:hover{background:var(--surface-2);}
  .theme-swatch.active{border-color:var(--orange); background:var(--surface-2);}
  .swatch-dots{display:flex; gap:2px;}
  .swatch-dots span{
    width:14px; height:22px;
    display:block;
    border-radius:3px;
  }
  .swatch-dots span:first-child{border-radius:3px 0 0 3px;}
  .swatch-dots span:last-child{border-radius:0 3px 3px 0;}
  .swatch-name{
    font-family:'JetBrains Mono', monospace;
    font-size:9.5px;
    letter-spacing:0.02em;
    color:var(--paper-dim);
    text-align:center;
    line-height:1.2;
  }
  .theme-swatch.active .swatch-name{color:var(--paper); font-weight:600;}

  /* Controls row */
  .controls{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
    justify-content:space-between;
    margin-bottom:28px;
  }
  .mode-group{display:flex; gap:6px; flex-wrap:wrap;}
  .mode-btn{
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    padding:8px 14px;
    border-radius:6px;
    border:1px solid var(--line);
    background:transparent;
    color:var(--paper-dim);
    cursor:pointer;
    transition:all .15s ease;
  }
  .mode-btn:hover{color:var(--paper);}
  .mode-btn.active{
    background:var(--orange);
    color:var(--ink);
    border-color:var(--orange);
    font-weight:600;
    box-shadow:0 0 0 3px rgba(242,121,58,0.18);
  }
  .custom-toggle{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--paper-dim);
    background:none;
    border:none;
    text-decoration:underline;
    text-underline-offset:3px;
    cursor:pointer;
  }
  .custom-toggle:hover{color:var(--violet);}

  .custom-box{display:none; margin-bottom:20px;}
  .custom-box.show{display:block;}
  .custom-box textarea{
    width:100%;
    min-height:90px;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:10px;
    color:var(--paper);
    font-family:'JetBrains Mono', monospace;
    font-size:14px;
    padding:14px;
    resize:vertical;
  }
  .custom-box button{
    margin-top:8px;
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    padding:8px 16px;
    border-radius:6px;
    border:1px solid var(--orange);
    background:transparent;
    color:var(--orange);
    cursor:pointer;
  }
  .custom-box button:hover{background:var(--orange); color:var(--ink);}

  /* Type stage */
  .stage{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:16px;
    padding:40px 36px;
    box-shadow:var(--shadow);
    position:relative;
    min-height:170px;
  }
  .caps-warning{
    position:absolute;
    top:14px; right:20px;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:0.1em;
    color:var(--ribbon);
    display:none;
  }
  .caps-warning.show{display:block;}

  .passage-viewport{
    height:118px;
    overflow:hidden;
    position:relative;
    -webkit-mask-image:linear-gradient(to bottom, transparent 0, #000 6%, #000 90%, transparent 100%);
    mask-image:linear-gradient(to bottom, transparent 0, #000 6%, #000 90%, transparent 100%);
  }
  .passage{
    font-family:'JetBrains Mono', monospace;
    font-size:22px;
    line-height:1.8;
    letter-spacing:0.01em;
    user-select:none;
    white-space:normal;
    word-wrap:break-word;
    transition:transform .25s ease;
  }
  .passage span{position:relative;}
  .ch-pending{color:var(--paper-dim);}
  .ch-correct{color:var(--paper);}
  .ch-incorrect{color:var(--ribbon); text-decoration:underline; text-decoration-color:var(--ribbon);}
  .ch-current{
    background:var(--orange);
    color:var(--ink);
    border-radius:2px;
    animation:pulse 1s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:1;}
    50%{opacity:0.55;}
  }

  .hidden-input{
    position:absolute;
    opacity:0;
    pointer-events:none;
  }

  .stage-hint{
    margin-top:20px;
    font-family:'JetBrains Mono', monospace;
    font-size:11.5px;
    color:var(--paper-dim);
    letter-spacing:0.04em;
  }
  .stage-hint kbd{
    background:var(--surface-2);
    border:1px solid var(--line);
    border-radius:4px;
    padding:1px 6px;
    color:var(--paper);
  }

  /* Ledger stat strip */
  .ledger{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    margin-top:24px;
    border:1px solid var(--line);
    border-radius:12px;
    overflow:hidden;
  }
  .ledger .cell{
    padding:16px 18px;
    border-right:1px solid var(--line);
    background:var(--surface);
  }
  .ledger .cell:last-child{border-right:none;}
  .ledger .label{
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    letter-spacing:0.15em;
    text-transform:uppercase;
    color:var(--paper-dim);
    margin-bottom:6px;
  }
  .ledger .value{
    font-family:'JetBrains Mono', monospace;
    font-size:26px;
    font-weight:600;
  }
  .ledger .value.accent{color:var(--orange);}
  .ledger .value.warn{color:var(--ribbon);}

  /* Results — strike sheet */
  .overlay{
    display:none;
    position:fixed; inset:0;
    background:rgba(0,0,0,0.55);
    align-items:center;
    justify-content:center;
    z-index:50;
    padding:20px;
  }
  .overlay.show{display:flex;}
  .strike-sheet{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:16px;
    max-width:600px;
    width:100%;
    max-height:88vh;
    overflow-y:auto;
    padding:36px;
    box-shadow:var(--shadow);
    position:relative;
  }
  .strike-sheet::before{
    content:"";
    position:absolute;
    top:0;left:0;right:0;
    height:6px;
    background:repeating-linear-gradient(90deg, var(--orange) 0 10px, var(--violet) 10px 20px, transparent 20px 24px);
    border-radius:16px 16px 0 0;
  }
  .sheet-title{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:0.25em;
    text-transform:uppercase;
    color:var(--violet);
    margin-bottom:4px;
  }
  .sheet-wpm{
    font-size:56px;
    font-weight:700;
    line-height:1;
    margin-bottom:2px;
  }
  .sheet-wpm span{font-size:18px; color:var(--paper-dim); font-weight:400; margin-left:8px;}
  .pb-badge{
    display:inline-block;
    margin-top:10px;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:0.08em;
    color:var(--ink);
    background:var(--orange);
    padding:4px 10px;
    border-radius:20px;
    font-weight:700;
  }
  .sheet-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:1px;
    background:var(--line);
    border:1px solid var(--line);
    border-radius:10px;
    overflow:hidden;
    margin:22px 0;
  }
  .sheet-grid .cell{background:var(--surface); padding:12px 14px;}
  .sheet-grid .label{
    font-family:'JetBrains Mono', monospace;
    font-size:9.5px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--paper-dim);
    margin-bottom:4px;
  }
  .sheet-grid .value{font-family:'JetBrains Mono', monospace; font-size:19px; font-weight:600;}

  .chart-label{
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    letter-spacing:0.15em;
    text-transform:uppercase;
    color:var(--paper-dim);
    margin-bottom:8px;
  }
  svg.chart{width:100%; height:110px; overflow:visible;}

  .history{margin-top:26px;}
  table{width:100%; border-collapse:collapse; font-family:'JetBrains Mono', monospace; font-size:12.5px;}
  th,td{text-align:left; padding:8px 6px; border-bottom:1px solid var(--line); color:var(--paper-dim);}
  th{font-size:10px; letter-spacing:0.1em; text-transform:uppercase;}
  td.hl{color:var(--paper); font-weight:600;}

  .sheet-actions{
    display:flex; gap:10px; margin-top:26px;
  }
  .btn-primary{
    flex:1;
    background:var(--orange);
    color:var(--ink);
    border:none;
    border-radius:8px;
    padding:12px 18px;
    font-family:'JetBrains Mono', monospace;
    font-weight:700;
    font-size:13px;
    letter-spacing:0.04em;
    cursor:pointer;
  }
  .btn-primary:hover{background:var(--orange-dim);}
  .btn-ghost{
    background:transparent;
    color:var(--paper-dim);
    border:1px solid var(--line);
    border-radius:8px;
    padding:12px 18px;
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    cursor:pointer;
  }
  .btn-ghost:hover{color:var(--paper); border-color:var(--paper-dim);}

  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--line); border-radius:4px;}

  @media (max-width:600px){
    .passage{font-size:17px; line-height:1.9;}
    .ledger{grid-template-columns:repeat(2,1fr);}
    .ledger .cell:nth-child(2){border-right:none;}
    .sheet-grid{grid-template-columns:repeat(2,1fr);}
    .sheet-wpm{font-size:44px;}
  }

  @media (prefers-reduced-motion: reduce){
    .ch-current{animation:none;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <div class="brand-eyebrow">PRECISION TYPING TRAINER</div>
      <div class="brand-name">Type<span>Forge</span></div>
    </div>
    <div class="header-controls">
      <button class="icon-btn" id="soundBtn" title="Toggle keystroke sound">♪</button>
      <div class="theme-picker">
        <button class="icon-btn" id="themeBtn" title="Choose a theme">🎨</button>
        <div class="theme-panel" id="themePanel"></div>
      </div>
    </div>
  </header>

  <div class="controls">
    <div class="mode-group" id="modeGroup">
      <button class="mode-btn" data-mode="15">15s</button>
      <button class="mode-btn active" data-mode="30">30s</button>
      <button class="mode-btn" data-mode="60">60s</button>
      <button class="mode-btn" data-mode="120">120s</button>
    </div>
    <button class="custom-toggle" id="customToggle">use custom text</button>
  </div>

  <div class="custom-box" id="customBox">
    <textarea id="customText" placeholder="Paste or type your own practice passage here…"></textarea>
    <button id="applyCustom">use this text</button>
  </div>

  <div class="stage">
    <div class="caps-warning" id="capsWarning">CAPS LOCK ON</div>
    <div class="passage-viewport">
      <div class="passage mono" id="passage"></div>
    </div>
    <input class="hidden-input" id="hiddenInput" autocomplete="off" autocapitalize="off" spellcheck="false">
    <div class="stage-hint">Just start typing to begin · <kbd>Tab</kbd> or <kbd>Enter</kbd> to restart</div>
  </div>

  <div class="ledger">
    <div class="cell">
      <div class="label">WPM</div>
      <div class="value accent" id="liveWpm">0</div>
    </div>
    <div class="cell">
      <div class="label">Accuracy</div>
      <div class="value" id="liveAcc">100%</div>
    </div>
    <div class="cell">
      <div class="label">Time</div>
      <div class="value" id="liveTime">30</div>
    </div>
    <div class="cell">
      <div class="label">Mistakes</div>
      <div class="value warn" id="liveMistakes">0</div>
    </div>
  </div>

</div>

<div class="overlay" id="overlay">
  <div class="strike-sheet">
    <div class="sheet-title">Strike Sheet — Session Result</div>
    <div class="sheet-wpm" id="resultWpm">0<span>wpm</span></div>
    <div id="pbBadge"></div>

    <div class="sheet-grid">
      <div class="cell"><div class="label">Accuracy</div><div class="value" id="resultAcc">0%</div></div>
      <div class="cell"><div class="label">Mistakes</div><div class="value" id="resultMistakes">0</div></div>
      <div class="cell"><div class="label">Consistency</div><div class="value" id="resultConsistency" style="color:var(--violet)">0%</div></div>
      <div class="cell"><div class="label">Characters</div><div class="value" id="resultChars">0</div></div>
      <div class="cell"><div class="label">Duration</div><div class="value" id="resultDuration">0s</div></div>
      <div class="cell"><div class="label">Best WPM</div><div class="value" id="resultBest">0</div></div>
    </div>

    <div class="chart-label">WPM over time</div>
    <svg class="chart" id="chartSvg" viewBox="0 0 500 110" preserveAspectRatio="none"></svg>

    <div class="history">
      <div class="chart-label">Recent sessions</div>
      <table id="historyTable">
        <thead><tr><th>When</th><th>Mode</th><th>WPM</th><th>Acc</th></tr></thead>
        <tbody id="historyBody"></tbody>
      </table>
    </div>

    <div class="sheet-actions">
      <button class="btn-primary" id="tryAgainBtn">Try again</button>
      <button class="btn-ghost" id="closeBtn">Close</button>
    </div>
  </div>
</div>

<script>
(function(){
  const PASSAGES = [
    "The quick brown fox jumps over the lazy dog while the sun sets slowly behind the distant mountains.",
    "Great things are never done by impulse, they are a series of small things brought together over time.",
    "Programming is the art of telling another human what one wants the computer to do with total precision.",
    "In the middle of every difficulty lies opportunity waiting patiently for someone willing to look closer.",
    "She sells seashells by the seashore, and the shells she sells are seashells for certain, everyone agrees.",
    "The only way to do great work is to love what you do, and to keep doing it even when it feels difficult.",
    "A journey of a thousand miles begins with a single step taken deliberately in the right direction.",
    "Technology is best when it brings people together instead of pulling them further apart from each other.",
    "Simplicity is the ultimate sophistication, and clarity is often harder to achieve than complexity.",
    "Success usually comes to those who are too busy looking for it to notice whether or not it arrived."
  ];

  const state = {
    mode: 30,
    text: "",
    typed: [],
    idx: 0,
    startTime: null,
    timer: null,
    timeLeft: 30,
    mistakes: 0,
    totalKeystrokes: 0,
    finished: false,
    wpmSamples: [],
    soundOn: false,
    customActive: false
  };

  const el = {
    passage: document.getElementById('passage'),
    hiddenInput: document.getElementById('hiddenInput'),
    liveWpm: document.getElementById('liveWpm'),
    liveAcc: document.getElementById('liveAcc'),
    liveTime: document.getElementById('liveTime'),
    liveMistakes: document.getElementById('liveMistakes'),
    capsWarning: document.getElementById('capsWarning'),
    overlay: document.getElementById('overlay'),
    resultWpm: document.getElementById('resultWpm'),
    resultAcc: document.getElementById('resultAcc'),
    resultMistakes: document.getElementById('resultMistakes'),
    resultConsistency: document.getElementById('resultConsistency'),
    resultChars: document.getElementById('resultChars'),
    resultDuration: document.getElementById('resultDuration'),
    resultBest: document.getElementById('resultBest'),
    pbBadge: document.getElementById('pbBadge'),
    chartSvg: document.getElementById('chartSvg'),
    historyBody: document.getElementById('historyBody'),
    themeBtn: document.getElementById('themeBtn'),
    themePanel: document.getElementById('themePanel'),
    soundBtn: document.getElementById('soundBtn'),
    customToggle: document.getElementById('customToggle'),
    customBox: document.getElementById('customBox'),
    customText: document.getElementById('customText'),
    applyCustom: document.getElementById('applyCustom'),
    modeGroup: document.getElementById('modeGroup'),
    tryAgainBtn: document.getElementById('tryAgainBtn'),
    closeBtn: document.getElementById('closeBtn'),
    stage: document.querySelector('.stage')
  };

  // ---------- theme palettes ----------
  const CLASSIC_THEMES = {
    'classic-dark': { name:'Classic Dark', mode:'dark', swatches:['#F2793A','#A07BFF','#0D1912'] },
    'classic-light': { name:'Classic Light', mode:'light', swatches:['#CC5F1B','#6C43D6','#F1EEE0'] }
  };

  const THEMES = {
    meadow: {name:'Meadow', mode:'dark', ink:'#081408', surface:'#0E250E', surface2:'#153515', paper:'#EDEEED', paperDim:'#82A682', orange:'#8FEA52', orangeDim:'#67DA1B', violet:'#DEF372', violetDim:'#CEEE2B', ribbon:'#E1544A', line:'#234E23', swatches:['#499A13','#BBDC12','#276F27']},
    cobalt: {name:'Cobalt Bloom', mode:'dark', ink:'#02081A', surface:'#040E2F', surface2:'#061543', paper:'#ECEDEE', paperDim:'#7282B6', orange:'#3D84FF', orangeDim:'#005AF5', violet:'#DD66FF', violetDim:'#CB1AFF', ribbon:'#E1544A', line:'#0F2261', swatches:['#5996FF','#F4CEFF','#1B4EF5']},
    moonlit_teal: {name:'Moonlit Teal', mode:'dark', ink:'#0C110F', surface:'#151E1C', surface2:'#1E2C29', paper:'#EDEDED', paperDim:'#8C9B98', orange:'#69D3C0', orangeDim:'#37BEA5', violet:'#8087E5', violetDim:'#404AD8', ribbon:'#E1544A', line:'#2F413D', swatches:['#408175','#B5B9F0','#2E4540']},
    deep_current: {name:'Deep Current', mode:'dark', ink:'#0B0F11', surface:'#141B1F', surface2:'#1D272D', paper:'#EDEDED', paperDim:'#8B979D', orange:'#67A9D6', orangeDim:'#3488C0', violet:'#70C0F5', violetDim:'#29A1EF', ribbon:'#E1544A', line:'#2D3B43', swatches:['#3282B8','#BBE1FA','#1B262C']},
    neon_circuit: {name:'Neon Circuit', mode:'dark', ink:'#0C0B11', surface:'#16141F', surface2:'#201D2D', paper:'#EDEDED', paperDim:'#8F8A9D', orange:'#E6FF3D', orangeDim:'#D5F500', violet:'#8D66FF', violetDim:'#541AFF', ribbon:'#E1544A', line:'#322D43', swatches:['#E4FF30','#5B23FF','#362F4F']},
    magenta_ember: {name:'Magenta Ember', mode:'dark', ink:'#180417', surface:'#2B0829', surface2:'#3F0B3C', paper:'#EEECEE', paperDim:'#B177AD', orange:'#FFC43D', orangeDim:'#F5AB00', violet:'#F1749D', violetDim:'#EA2F6C', ribbon:'#E1544A', line:'#5B1657', swatches:['#FFB200','#D91656','#640D5F']},
    midnight_blaze: {name:'Midnight Blaze', mode:'dark', ink:'#040718', surface:'#080D2B', surface2:'#0B133F', paper:'#ECEDEE', paperDim:'#7780B1', orange:'#F67F46', orangeDim:'#E9530B', violet:'#7E90E7', violetDim:'#3E58DB', ribbon:'#E1544A', line:'#16205B', swatches:['#F68048','#2845D6','#0D1A63']},
    orchid_bloom: {name:'Orchid Bloom', mode:'dark', ink:'#0C0814', surface:'#160F24', surface2:'#1F1535', paper:'#EDEDEE', paperDim:'#8D82A6', orange:'#FF3DA8', orangeDim:'#F50087', violet:'#E184BE', violetDim:'#D2469D', ribbon:'#E1544A', line:'#30234E', swatches:['#FF70BF','#D552A3','#462C7D']},
    pine_noir: {name:'Pine Noir', mode:'dark', ink:'#011B13', surface:'#033023', surface2:'#044633', paper:'#ECEEEE', paperDim:'#6EB9A4', orange:'#3DFFE5', orangeDim:'#00F5D5', violet:'#90A9D5', violetDim:'#597DC0', ribbon:'#E1544A', line:'#0B654B', swatches:['#008170','#232D3F','#005B41']},
    glacier: {name:'Glacier', mode:'light', ink:'#E5FAFA', surface:'#FFFFFF', surface2:'#D4F7F7', paper:'#004747', paperDim:'#3D9A9A', orange:'#32A7AE', orangeDim:'#278186', violet:'#2899A4', violetDim:'#1E727B', ribbon:'#B2382F', line:'#A4F4F4', swatches:['#71C9CE','#A6E3E9','#E3FDFD']},
    petal_mint: {name:'Petal Mint', mode:'light', ink:'#E7F9EA', surface:'#FFFFFF', surface2:'#D7F4DC', paper:'#054310', paperDim:'#449253', orange:'#6F71B2', orangeDim:'#595A8F', violet:'#658394', violetDim:'#506875', ribbon:'#B2382F', line:'#ABEDB7', swatches:['#9FA1FF','#AEE2FF','#D9F9DF']},
    sunset_warm: {name:'Sunset Warm', mode:'light', ink:'#FCF4E3', surface:'#FFFFFF', surface2:'#FAECD1', paper:'#472F00', paperDim:'#A17C36', orange:'#CB3316', orangeDim:'#9D2811', violet:'#CC5800', violetDim:'#994200', ribbon:'#B2382F', line:'#FADA9E', swatches:['#E73F1E','#FB6C00','#FFDD9C']}
  };

  const VAR_MAP = {ink:'--ink', surface:'--surface', surface2:'--surface-2', paper:'--paper', paperDim:'--paper-dim', orange:'--orange', orangeDim:'--orange-dim', violet:'--violet', violetDim:'--violet-dim', ribbon:'--ribbon', line:'--line'};

  function applyTheme(id){
    const root = document.documentElement;
    if(CLASSIC_THEMES[id]){
      Object.values(VAR_MAP).forEach(v => root.style.removeProperty(v));
      root.setAttribute('data-theme', CLASSIC_THEMES[id].mode);
    } else if(THEMES[id]){
      const t = THEMES[id];
      root.setAttribute('data-theme', t.mode);
      Object.keys(VAR_MAP).forEach(key => root.style.setProperty(VAR_MAP[key], t[key]));
    } else {
      return applyTheme('classic-dark');
    }
    theme = id;
    saveJSON('tf_theme_id', id);
    renderThemePanel();
  }

  function renderThemePanel(){
    const all = Object.assign({}, CLASSIC_THEMES, THEMES);
    el.themePanel.innerHTML = Object.entries(all).map(([id, t]) => `
      <button class="theme-swatch ${id===theme ? 'active':''}" data-theme-id="${id}" title="${t.name}">
        <span class="swatch-dots">${t.swatches.map(c=>`<span style="background:${c}"></span>`).join('')}</span>
        <span class="swatch-name">${t.name}</span>
      </button>
    `).join('');
  }


  function loadJSON(key, fallback){
    try{ const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
    catch(e){ return fallback; }
  }
  function saveJSON(key, val){
    try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){}
  }

  let bestWpm = loadJSON('tf_best', 0);
  let history = loadJSON('tf_history', []);
  let theme = loadJSON('tf_theme_id', 'classic-dark');
  let soundOn = loadJSON('tf_sound', false);

  applyTheme(theme);
  state.soundOn = soundOn;
  el.soundBtn.classList.toggle('active', soundOn);

  // ---------- audio ----------
  let audioCtx = null;
  function click(){
    if(!state.soundOn) return;
    try{
      if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'square';
      o.frequency.value = 620 + Math.random()*80;
      g.gain.value = 0.04;
      o.connect(g); g.connect(audioCtx.destination);
      o.start();
      g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.05);
      o.stop(audioCtx.currentTime + 0.06);
    }catch(e){}
  }

  // ---------- passage rendering ----------
  function pickPassage(){
    return PASSAGES[Math.floor(Math.random()*PASSAGES.length)];
  }

  function escapeHtml(ch){
    if(ch === '&') return '&amp;';
    if(ch === '<') return '&lt;';
    if(ch === '>') return '&gt;';
    return ch;
  }

  function renderPassage(){
    el.passage.innerHTML = state.text.split('').map((ch, i) => {
      let cls = 'ch-pending';
      if(i < state.typed.length){
        cls = state.typed[i] === ch ? 'ch-correct' : 'ch-incorrect';
      } else if(i === state.idx){
        cls = 'ch-current';
      }
      return `<span class="${cls}">${escapeHtml(ch)}</span>`;
    }).join('');
    scrollPassageIntoView();
  }

  function scrollPassageIntoView(){
    const current = el.passage.querySelector('.ch-current') ||
                     el.passage.querySelectorAll('span')[el.passage.querySelectorAll('span').length - 1];
    if(!current) { el.passage.style.transform = 'translateY(0)'; return; }
    const lineHeight = parseFloat(getComputedStyle(el.passage).lineHeight);
    const scrollAmount = Math.max(0, current.offsetTop - lineHeight);
    el.passage.style.transform = `translateY(-${scrollAmount}px)`;
  }

  function resetTest(keepMode){
    clearInterval(state.timer);
    state.text = state.customActive ? state.customText : pickPassage();
    state.typed = [];
    state.idx = 0;
    state.startTime = null;
    state.timeLeft = state.mode;
    state.mistakes = 0;
    state.totalKeystrokes = 0;
    state.finished = false;
    state.wpmSamples = [];
    el.liveWpm.textContent = '0';
    el.liveAcc.textContent = '100%';
    el.liveTime.textContent = state.mode;
    el.liveMistakes.textContent = '0';
    el.overlay.classList.remove('show');
    renderPassage();
    el.hiddenInput.value = '';
    el.hiddenInput.focus();
  }

  // ---------- timing / stats ----------
  function currentWpm(){
    if(!state.startTime) return 0;
    const elapsedMin = (Date.now() - state.startTime) / 60000;
    if(elapsedMin <= 0) return 0;
    const correctChars = state.typed.filter((c,i) => c === state.text[i]).length;
    return Math.round((correctChars/5) / elapsedMin);
  }
  function currentAcc(){
    if(state.totalKeystrokes === 0) return 100;
    const correct = state.totalKeystrokes - state.mistakes;
    return Math.max(0, Math.round((correct/state.totalKeystrokes)*100));
  }

  function startTimerIfNeeded(){
    if(state.timer) return;
    state.startTime = Date.now();
    state.timer = setInterval(() => {
      state.timeLeft -= 1;
      const wpm = currentWpm();
      state.wpmSamples.push(wpm);
      el.liveTime.textContent = Math.max(0, state.timeLeft);
      el.liveWpm.textContent = wpm;
      el.liveAcc.textContent = currentAcc() + '%';
      el.liveMistakes.textContent = state.mistakes;
      if(state.timeLeft <= 0){
        finishTest();
      }
    }, 1000);
  }

  function finishTest(){
    if(state.finished) return;
    state.finished = true;
    clearInterval(state.timer);
    const wpm = currentWpm();
    const acc = currentAcc();
    const mean = state.wpmSamples.length ? state.wpmSamples.reduce((a,b)=>a+b,0)/state.wpmSamples.length : wpm;
    const variance = state.wpmSamples.length ? state.wpmSamples.reduce((a,b)=>a+Math.pow(b-mean,2),0)/state.wpmSamples.length : 0;
    const stdev = Math.sqrt(variance);
    const consistency = mean > 0 ? Math.max(0, Math.round(100 - (stdev/mean)*100)) : 100;
    const duration = state.mode - Math.max(0, state.timeLeft);
    const isNewBest = wpm > bestWpm;
    if(isNewBest) bestWpm = wpm;

    saveJSON('tf_best', bestWpm);
    history.unshift({
      when: new Date().toLocaleString(undefined, {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}),
      mode: state.customActive ? 'custom' : (state.mode + 's'),
      wpm, acc
    });
    history = history.slice(0, 10);
    saveJSON('tf_history', history);

    showResults({wpm, acc, mistakes: state.mistakes, consistency, chars: state.typed.length, duration, isNewBest});
  }

  function showResults(r){
    el.resultWpm.innerHTML = r.wpm + '<span>wpm</span>';
    el.resultAcc.textContent = r.acc + '%';
    el.resultMistakes.textContent = r.mistakes;
    el.resultConsistency.textContent = r.consistency + '%';
    el.resultChars.textContent = r.chars;
    el.resultDuration.textContent = r.duration + 's';
    el.resultBest.textContent = bestWpm;
    el.pbBadge.innerHTML = r.isNewBest ? '<span class="pb-badge">★ NEW PERSONAL BEST</span>' : '';

    drawChart(state.wpmSamples);
    renderHistory();
    el.overlay.classList.add('show');
  }

  function drawChart(samples){
    const svg = el.chartSvg;
    svg.innerHTML = '';
    if(samples.length < 2){
      svg.innerHTML = '<text x="250" y="55" fill="var(--paper-dim)" font-size="12" text-anchor="middle" font-family="JetBrains Mono, monospace">not enough data</text>';
      return;
    }
    const w = 500, h = 110, pad = 8;
    const max = Math.max(...samples, 1);
    const min = Math.min(...samples, 0);
    const range = Math.max(max - min, 1);
    const stepX = (w - pad*2) / (samples.length - 1);
    const points = samples.map((v,i) => {
      const x = pad + i*stepX;
      const y = h - pad - ((v - min)/range)*(h - pad*2);
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    }).join(' ');

    const ns = "http://www.w3.org/2000/svg";

    const defs = document.createElementNS(ns,'defs');
    const grad = document.createElementNS(ns,'linearGradient');
    grad.setAttribute('id','wpmGradient');
    grad.setAttribute('x1','0'); grad.setAttribute('y1','0');
    grad.setAttribute('x2','1'); grad.setAttribute('y2','0');
    const stop1 = document.createElementNS(ns,'stop');
    stop1.setAttribute('offset','0%'); stop1.setAttribute('stop-color','var(--violet)');
    const stop2 = document.createElementNS(ns,'stop');
    stop2.setAttribute('offset','100%'); stop2.setAttribute('stop-color','var(--orange)');
    grad.appendChild(stop1); grad.appendChild(stop2);
    defs.appendChild(grad);
    svg.appendChild(defs);

    const poly = document.createElementNS(ns,'polyline');
    poly.setAttribute('points', points);
    poly.setAttribute('fill','none');
    poly.setAttribute('stroke','url(#wpmGradient)');
    poly.setAttribute('stroke-width','2.5');
    poly.setAttribute('stroke-linejoin','round');
    poly.setAttribute('stroke-linecap','round');
    svg.appendChild(poly);

    const fillPoly = document.createElementNS(ns,'polygon');
    fillPoly.setAttribute('points', `${pad},${h-pad} ${points} ${w-pad},${h-pad}`);
    fillPoly.setAttribute('fill','url(#wpmGradient)');
    fillPoly.setAttribute('opacity','0.10');
    svg.insertBefore(fillPoly, poly);
  }

  function renderHistory(){
    el.historyBody.innerHTML = history.map(h => `
      <tr>
        <td>${h.when}</td>
        <td>${h.mode}</td>
        <td class="hl">${h.wpm}</td>
        <td>${h.acc}%</td>
      </tr>
    `).join('') || '<tr><td colspan="4">No sessions yet</td></tr>';
  }

  // ---------- input handling ----------
  el.stage.addEventListener('click', () => el.hiddenInput.focus());

  el.hiddenInput.addEventListener('keydown', (e) => {
    if(e.key === 'CapsLock'){
      setTimeout(()=> el.capsWarning.classList.toggle('show', e.getModifierState && e.getModifierState('CapsLock')), 0);
    } else if(e.getModifierState && e.getModifierState('CapsLock')){
      el.capsWarning.classList.add('show');
    } else {
      el.capsWarning.classList.remove('show');
    }

    if(e.key === 'Tab' || (e.key === 'Enter' && state.finished)){
      e.preventDefault();
      resetTest();
      return;
    }
    if(state.finished) return;

    if(e.key === 'Backspace'){
      e.preventDefault();
      if(state.typed.length > 0){
        state.typed.pop();
        state.idx = state.typed.length;
        renderPassage();
      }
      return;
    }
    if(e.key === 'Enter'){ e.preventDefault(); return; }
    if(e.key.length !== 1) return; // ignore modifier/arrow keys etc.

    e.preventDefault();
    startTimerIfNeeded();
    click();

    const target = state.text[state.idx];
    state.typed.push(e.key);
    state.totalKeystrokes += 1;
    if(e.key !== target) state.mistakes += 1;
    state.idx += 1;
    renderPassage();

    if(state.idx >= state.text.length){
      finishTest();
    }
  });

  // ---------- controls ----------
  el.modeGroup.addEventListener('click', (e) => {
    const btn = e.target.closest('.mode-btn');
    if(!btn) return;
    [...el.modeGroup.children].forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.mode = parseInt(btn.dataset.mode, 10);
    resetTest();
  });

  el.customToggle.addEventListener('click', () => {
    el.customBox.classList.toggle('show');
  });
  el.applyCustom.addEventListener('click', () => {
    const txt = el.customText.value.trim();
    if(txt.length < 10) return;
    state.customActive = true;
    state.customText = txt;
    el.customBox.classList.remove('show');
    resetTest();
  });

  el.themeBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    el.themePanel.classList.toggle('show');
  });
  el.themePanel.addEventListener('click', (e) => {
    const btn = e.target.closest('.theme-swatch');
    if(!btn) return;
    applyTheme(btn.dataset.themeId);
    el.themePanel.classList.remove('show');
  });
  document.addEventListener('click', (e) => {
    if(!e.target.closest('.theme-picker')) el.themePanel.classList.remove('show');
  });
  el.soundBtn.addEventListener('click', () => {
    state.soundOn = !state.soundOn;
    el.soundBtn.classList.toggle('active', state.soundOn);
    saveJSON('tf_sound', state.soundOn);
  });

  el.tryAgainBtn.addEventListener('click', () => resetTest());
  el.closeBtn.addEventListener('click', () => el.overlay.classList.remove('show'));

  document.addEventListener('keydown', (e) => {
    if(document.activeElement !== el.hiddenInput && el.customBox.classList.contains('show') === false){
      if(e.key === 'Tab'){ e.preventDefault(); resetTest(); }
    }
  });

  // init
  resetTest();
})();
</script>
</body>
</html>
